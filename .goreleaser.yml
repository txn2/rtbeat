# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

env:
  - GO111MODULE=on

before:
  hooks:
    - go mod download

builds:
  - id: rtbeat
    main: .
    binary: rtbeat
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: '{{ .CommitTimestamp }}'
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/elastic/beats/v7/libbeat/version.commit={{ .FullCommit }}
      - -X github.com/elastic/beats/v7/libbeat/version.buildTime={{ .Date }}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - NOTICE
      - README.md
      - rtbeat.yml
      - rtbeat.reference.yml

checksum:
  name_template: '{{ .ProjectName }}_checksums.txt'

# Sign release artifacts with Cosign (keyless - uses OIDC identity).
signs:
  - id: archives
    cmd: cosign
    artifacts: archive
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"
  - id: checksums
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"

# Software Bill of Materials for each archive.
sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - Merge pull request
      - Merge branch
      - go mod tidy

dockers_v2:
  - id: alpine
    dockerfile: Dockerfile
    ids:
      - rtbeat
    images:
      - txn2/rtbeat
    tags:
      - latest
      - "{{ .Tag }}"
      - "v{{ .Major }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"

docker_signs:
  - cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "${artifact}"
    artifacts: all

release:
  github:
    owner: txn2
    name: rtbeat
  name_template: "{{.ProjectName}}-v{{.Version}}"
  draft: true

brews:
  - name: rtbeat
    repository:
      owner: txn2
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: Craig Johnston
      email: cjimti@gmail.com
    directory: Formula
    homepage: https://github.com/txn2/rtbeat
    description: "Elastic Beat that receives rxtx batches over HTTP and publishes them as Beats events."
    license: "Apache-2.0"
    test: |
      system "#{bin}/rtbeat version"
